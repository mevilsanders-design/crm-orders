<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRM для торгового представителя</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 10px; }
    nav button { margin-right: 8px; padding: 8px 12px; cursor: pointer; }
    .section { display: none; }
    .active { display: block; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #ccc; padding: 6px 8px; text-align: left; }
    input, select { padding: 6px; margin-right: 6px; width: 100%; box-sizing: border-box; }
    input[type="number"] { width: 80px; }
    button { padding: 6px 12px; cursor: pointer; border: none; }
    .status-new { color: #007bff; }
    .status-sent { color: #28a745; }
    .status-confirmed { color: #ffc107; }
    .actions-col { width: 140px; text-align: center; }
    .btn-edit { background: #ffc107; padding: 4px 8px; margin-right: 4px; border-radius: 3px; }
    .btn-delete { background: #dc3545; color: white; padding: 4px 8px; border-radius: 3px; }
    .btn-add { background: #28a745; color: white; padding: 8px 12px; margin-top: 10px; }
    #order-items { margin: 10px 0; }
    #order-items div { margin-bottom: 8px; display: flex; gap: 5px; align-items: center; }
    #order-items select { flex: 2; }
    #order-items input { flex: 1; }
    #order-items button { flex: 0; color: red; }

    /* Модальное окно */
    #order-details-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }
    #order-details-modal .modal-content {
      background: white;
      margin: 40px auto;
      padding: 20px;
      max-width: 500px;
      border-radius: 8px;
    }

    .total-sum-block {
      margin-bottom:15px;
      padding:10px;
      background:#f8f9fa;
      border:1px solid #dee2e6;
      border-radius:4px;
    }
  </style>
</head>
<body>
  <h1>CRM для торгового представителя</h1>
  <nav>
    <button onclick="showSection('clients')">Клиенты</button>
    <button onclick="showSection('products')">Товары</button>
    <button onclick="showSection('orders')">Заказы</button>
    <button onclick="showSection('create-order')">Новый заказ</button>
  </nav>

  <!-- Клиенты -->
  <div id="clients" class="section active">
    <h2>Клиенты</h2>
    <input id="client-name" placeholder="Название клиента" />
    <input id="client-address" placeholder="Адрес" />
    <button class="btn-add" onclick="addClientWithCheck()">Добавить клиента</button>
    <table>
      <thead>
        <tr>
          <th>Клиент</th>
          <th>Адрес</th>
          <th class="actions-col">Действия</th>
        </tr>
      </thead>
      <tbody id="clients-list"></tbody>
    </table>
  </div>

  <!-- Товары -->
  <div id="products" class="section">
    <h2>Товары</h2>
    <input id="product-name" placeholder="Наименование товара" />
    <input id="product-price" type="number" placeholder="Цена" step="0.01" />
    <button class="btn-add" onclick="addProduct()">Добавить товар</button>
    <table>
      <thead>
        <tr>
          <th>Товар</th>
          <th>Цена</th>
          <th class="actions-col">Действия</th>
        </tr>
      </thead>
      <tbody id="products-list"></tbody>
    </table>
  </div>

  <!-- Заказы (список) -->
  <div id="orders" class="section">
    <h2>Заказы</h2>

    <div style="margin-bottom:10px;">
      <label><strong>Фильтр по направлению:</strong></label>
      <select id="filter-direction" style="padding:6px; margin-left:8px;">
        <option value="">Все направления</option>
        <option value="Сергач">Сергач</option>
        <option value="Кстово">Кстово</option>
        <option value="Арз">Арз</option>
        <option value="Кнг-Лск">Кнг-Лск</option>
      </select>
    </div>

    <div class="total-sum-block">
      <strong>Общая сумма всех заказов:</strong> 
      <span id="total-orders-sum" style="font-size:1.2em; color:#28a745; font-weight:bold;">0 ₽</span>
    </div>

    <table>
      <thead>
        <tr>
          <th>№</th>
          <th>Направление</th>
          <th>Клиент</th>
          <th>Дата</th>
          <th>Сумма</th>
          <th>Статус</th>
          <th style="width:200px;">Состав заказа</th>
          <th class="actions-col">Действия</th>
        </tr>
      </thead>
      <tbody id="orders-list"></tbody>
    </table>
  </div>

  <!-- Новый заказ / редактирование -->
  <div id="create-order" class="section">
    <h2 id="create-order-title">Новый заказ</h2>
    <label>Клиент:</label>
    <select id="order-client"></select>

    <br><br>
    <label>Направление:</label>
    <select id="order-direction" style="padding:6px;">
      <option value="Сергач">Сергач</option>
      <option value="Кстово">Кстово</option>
      <option value="Арз">Арз</option>
      <option value="Кнг-Лск">Кнг-Лск</option>
    </select>

    <hr />
    <h3>Состав заказа</h3>
    <div id="order-items"></div>
    <button style="background:#17a2b8; color:white; padding:6px 10px;" onclick="addOrderItemRow()">+ Добавить позицию</button>
    <hr />
    <button onclick="saveOrder()" style="background:#28a745; color:white; padding:10px 16px; font-size:16px;">Сохранить заказ</button>
  </div>

  <!-- Модальное окно: подробный состав заказа -->
  <div id="order-details-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
    <div style="background:white; margin:40px auto; padding:20px; max-width:500px; border-radius:8px;">
      <h3>Состав заказа</h3>
      <div id="order-items-detail"></div>
      <button onclick="document.getElementById('order-details-modal').style.display='none'"
              style="margin-top:15px; padding:8px 16px;">Закрыть</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
