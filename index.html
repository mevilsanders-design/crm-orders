<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRM Trade Mobile</title>
    <!-- Иконка приложения (опционально, можно заменить на свою) -->
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        header {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 { margin: 0; font-size: 1.2rem; }

        /* Основной контент */
        .container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* Карточки заявок */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .client-name { font-weight: bold; font-size: 1.1rem; color: var(--primary); }
        .status-badge { font-size: 0.8rem; padding: 4px 8px; border-radius: 4px; background: #eee; color: #555; }
        .amount { color: var(--success); font-weight: bold; }

        .card-details { color: #666; font-size: 0.9rem; line-height: 1.4; }
        .address { color: #444; font-weight: 600; }

        /* Формы */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        textarea { resize: vertical; height: 100px; }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { background: #0056b3; }
        .btn-danger { background: var(--danger); color: white; margin-top: 10px;}
        .btn-back { background: #ccc; color: black; }

        /* Модальное окно (просмотр заявки) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 { margin-top: 0; color: var(--primary); }
        .detail-row { margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .detail-label { color: #888; font-size: 0.9rem; display: block; }
        .detail-value { font-size: 1rem; font-weight: 500; }
    </style>
</head>
<body>

    <header>
        <h1>CRM Trade</h1>
    </header>

    <div class="container" id="main-view">
        <!-- Кнопка добавления -->
        <button class="btn-primary" onclick="showAddForm()">+ Новая заявка</button>
        
        <!-- Список заявок -->
        <div id="orders-list" style="margin-top: 20px;"></div>
    </div>

    <!-- Форма добавления -->
    <div id="add-form-view" class="container" style="display: none;">
        <h2>Новая заявка</h2>
        <div class="form-group">
            <label>Название клиента</label>
            <input type="text" id="client-name" placeholder="ООО Ромашка">
        </div>
        <div class="form-group">
            <label>Адрес</label>
            <input type="text" id="client-address" placeholder="г. Москва, ул. Ленина 1">
        </div>
        <div class="form-group">
            <label>Сумма заказа</label>
            <input type="number" id="order-amount" placeholder="15000">
        </div>
        <div class="form-group">
            <label>Комментарий / Статус</label>
            <textarea id="order-comment" placeholder="Товар в наличии, ждем оплаты"></textarea>
        </div>
        <button class="btn-primary" onclick="saveOrder()">Сохранить заявку</button>
        <button class="btn-back" onclick="navHome()">Назад</button>
    </div>

    <!-- Модальное окно просмотра -->
    <div class="modal-overlay" id="view-modal">
        <div class="modal">
            <h2 id="modal-title">Детали заявки</h2>
            <div class="detail-row">
                <span class="detail-label">Клиент</span>
                <span class="detail-value" id="modal-client"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Адрес</span>
                <span class="detail-value" id="modal-address"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Сумма</span>
                <span class="detail-value amount" id="modal-amount"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Комментарий</span>
                <span class="detail-value" id="modal-comment"></span>
            </div>
            <button class="btn-danger" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <script>
        // --- Логика хранения данных ---
        const STORAGE_KEY = 'crm_orders_v1';

        function getOrders() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveOrders(orders) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
        }

        // --- Инициализация ---
        function renderList() {
            const list = document.getElementById('orders-list');
            const orders = getOrders();
            list.innerHTML = '';

            if (orders.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#888;">Пока нет заявок. Добавьте первую!</p>';
                return;
            }

            orders.forEach((order, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openViewModal(order);
                
                // Форматирование суммы
                const amount = order.amount ? order.amount.toLocaleString() + ' ₽' : 'Нет суммы';

                card.innerHTML = `
                    <div class="card-header">
                        <span class="client-name">${escapeHtml(order.client)}</span>
                        <span class="status-badge">Заявка</span>
                    </div>
                    <div class="card-details">
                        <div class="address">📍 ${escapeHtml(order.address)}</div>
                        <div class="amount">💰 ${amount}</div>
                        <div style="color:#777; font-size:0.85rem;">${escapeHtml(order.comment)}</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // --- Навигация ---
        function navHome() {
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('add-form-view').style.display = 'none';
            renderList();
        }

        function showAddForm() {
            // Очистка полей
            document.getElementById('client-name').value = '';
            document.getElementById('client-address').value = '';
            document.getElementById('order-amount').value = '';
            document.getElementById('order-comment').value = '';
            
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('add-form-view').style.display = 'block';
        }

        // --- Сохранение ---
        function saveOrder() {
            const name = document.getElementById('client-name').value.trim();
            const address = document.getElementById('client-address').value.trim();
            const amount = document.getElementById('order-amount').value.trim();
            const comment = document.getElementById('order-comment').value.trim();

            if (!name || !address) {
                alert('Пожалуйста, заполните название клиента и адрес!');
                return;
            }

            const newOrder = {
                id: Date.now(), // Уникальный ID
                client: name,
                address: address,
                amount: amount ? parseFloat(amount) : null,
                comment: comment,
                date: new Date().toLocaleDateString('ru-RU')
            };

            let orders = getOrders();
            orders.unshift(newOrder); // Добавляем в начало
            saveOrders(orders);

            navHome();
        }

        // --- Просмотр заявки ---
        function openViewModal(order) {
            document.getElementById('modal-title').innerText = `Заявка: ${order.client}`;
            document.getElementById('modal-client').innerText = order.client;
            document.getElementById('modal-address').innerText = order.address;
            
            const amt = order.amount ? order.amount.toLocaleString() + ' ₽' : 'Не указана';
            document.getElementById('modal-amount').innerText = amt;
            
            document.getElementById('modal-comment').innerText = order.comment || 'Без комментария';

            document.getElementById('view-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('view-modal').style.display = 'none';
        }

        // Защита от XSS (чтобы нельзя было вставить скрипт в поле)
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Запуск
        renderList();
    </script>
</body>
</html>
